apiVersion: batch/v1
kind: Job
metadata:
  name: dynamo-benchmark
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: benchmark-runner
        image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.0.0
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"
        env:
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token-secret
                key: HF_TOKEN
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -euo pipefail
            # Model served by the deployment
            MODEL="Qwen/Qwen3-0.6B"
            # Frontend LB service: <dgd-name>-cedana-lb.<namespace>.svc.cluster.local:8000
            # For vllm-agg-router-cedana in default namespace:
            URL="http://vllm-agg-router-cedana-cedana-lb.default.svc.cluster.local:8000"
            OUTPUT_DIR="/tmp/results/qwen3-0p6b-vllm-agg-router"

            for c in 1 2 5 10 50 100; do
                echo "=== Concurrency $c ==="
                aiperf profile \
                    --model "$MODEL" \
                    --url "$URL" \
                    --endpoint-type chat \
                    --streaming \
                    --concurrency $c \
                    --request-count $(( c * 3 > 10 ? c * 3 : 10 )) \
                    --synthetic-input-tokens-mean 2000 \
                    --output-tokens-mean 256 \
                    --artifact-dir "$OUTPUT_DIR/c$c" \
                    --ui none
            done
            echo "=== Benchmark complete ==="
      restartPolicy: Never
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
