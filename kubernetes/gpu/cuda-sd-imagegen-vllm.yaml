apiVersion: v1
kind: Pod
metadata:
  generateName: sd-vllm-
  namespace: default
spec:
  runtimeClassName: cedana
  restartPolicy: Never
  containers:
    - name: sd-vllm-server
      image: nvcr.io/nvidia/tritonserver:25.06-vllm-python-py3
      imagePullPolicy: IfNotPresent
      command:
        - bash
        - -c
        - |
          pip install diffusers accelerate;
          python3 -c "
          import asyncio
          from vllm import AsyncLLMEngine, AsyncEngineArgs, SamplingParams
          from fastapi import FastAPI
          import uvicorn
          import torch
          from diffusers import StableDiffusion35Pipeline

          app = FastAPI()

          # Load SD pipeline
          sd_pipe = StableDiffusion35Pipeline.from_pretrained('stabilityai/stable-diffusion-3.5-large', torch_dtype=torch.bfloat16)
          sd_pipe.to('cuda')
          sd_pipe.transformer = torch.compile(sd_pipe.transformer)

          @app.post('/generate')
          async def generate(data: dict):
              prompt = data.get('prompt', 'a cinematic photo of a robot')
              num_steps = data.get('num_inference_steps', 20)
              image = sd_pipe(prompt, num_inference_steps=num_steps).images[0]
              image.save('output.png')
              return {'status': 'success', 'saved_as': 'output.png'}

          @app.get('/health')
          async def health():
              return {'status': 'ok'}

          uvicorn.run(app, host='0.0.0.0', port=8000)
          "
      ports:
        - containerPort: 8000
      env:
        - name: HF_HOME
          value: /data/huggingface
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: HF_TOKEN
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      volumeMounts:
        - mountPath: /dev/shm
          name: devshm
        - mountPath: /data
          name: data
      securityContext:
        capabilities:
          add: ["IPC_LOCK"]
      readinessProbe:
        httpGet:
          path: /health
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 1
  volumes:
    - name: devshm
      emptyDir:
        sizeLimit: 200Gi
        medium: Memory
    - name: data
      persistentVolumeClaim:
        claimName: dgtest-pvc
