apiVersion: v1
kind: Pod
metadata:
  generateName: whisper-v3-
  namespace: default
spec:
  runtimeClassName: cedana
  containers:
    - name: whisper-sglang
      image: lmsysorg/sglang:latest
      imagePullPolicy: Always
      command:
        - python3
        - -m
        - sglang.launch_server
        - --model-path
        - openai/whisper-large-v3
        - --host
        - 0.0.0.0
        - --port
        - "8000"
      env:
        - name: HF_HOME
          value: /data/huggingface
        - name: HF_HUB_DISABLE_XET
          value: "1"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: HF_TOKEN
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
      volumeMounts:
        - mountPath: /dev/shm
          name: devshm
        - mountPath: /data
          name: data
      securityContext:
        capabilities:
          add: ["IPC_LOCK"]
      ports:
        - containerPort: 8000
  volumes:
    - name: devshm
      emptyDir:
        sizeLimit: 128Gi
        medium: Memory
    - name: data
      persistentVolumeClaim:
        claimName: dgtest-pvc
