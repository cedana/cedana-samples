apiVersion: v1
kind: Pod
metadata:
  generateName: cuda-vector-add-hostmem-
  namespace: default
spec:
  runtimeClassName: cedana # required for GPU C/R support (use nvidia for native)
  containers:
    - name: cuda-vector-add-hostmem
      image: cedana/cedana-samples:cuda
      imagePullPolicy: Always
      args:
        - -c
        - gpu_smr/vector_add_host
      resources:
        limits:
          nvidia.com/gpu: 1
